name: Deploy to Cloudflare Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: cloudflare-pages-lifetoolbox
  cancel-in-progress: true

jobs:
  build:
    name: Build static site
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version-file: .node-version
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run pages:build
        env:
          NEXT_PUBLIC_SITE_URL: ${{ vars.NEXT_PUBLIC_SITE_URL || 'https://life.hottoolsbox.com' }}
          NEXT_PUBLIC_GA_MEASUREMENT_ID: ${{ vars.NEXT_PUBLIC_GA_MEASUREMENT_ID }}

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: pages-out
          path: out
          retention-days: 1

  deploy:
    name: Deploy to Cloudflare
    needs: build
    runs-on: ubuntu-latest
    # Skip deploy when secrets are not configured (Cloudflare Git integration handles deploy instead)
    if: ${{ vars.ENABLE_ACTIONS_DEPLOY == 'true' }}
    steps:
      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: pages-out
          path: out

      - name: Deploy with Wrangler
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy out --project-name=lifetoolbox --branch=main
